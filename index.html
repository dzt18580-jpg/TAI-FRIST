<!DOCTYPE html>
<html>
<head>
    <title>苔的个人主页</title>
<style>
    body {
    margin: 0;
    font-family: "KaiTi", "STKaiti", serif;
    background: radial-gradient(circle at center, #1a1a1a, #000000);
    color: #f5f5f5;
    text-align: center;
    }

    .container {
        margin-top: 100px;
    }

    img {
        width: 120px;
        border-radius: 50%;
        border: 2px solid #aaa;
        filter: grayscale(100%);
    }

    h1 {
        font-size: 38px;
        margin: 20px 0;
        letter-spacing: 2px;
    }

    p {
        font-size: 18px;
        color: #ccc;
    }

    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 10px 25px;
        border: 1px solid #aaa;
        color: #eee;
        text-decoration: none;
        border-radius: 20px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #eee;
        color: #000;
    }
</style>
</head>

<hr style="width:50%;border:1px solid #555;">
    
<body>

<div class="container">
    <img src="me.jpg">

    <h1>你好 我是苔 </h1>
    <p>诗也老 赋也狂 我今剑杀玉楼郎</p>

    <a class="btn" href="#">联系我</a>
</div>

</body>
</html>

</body>
</html>
