<!DOCTYPE html>
<html>
<head>
    <title>苔的个人主页</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        img {
            width: 120px;
            border-radius: 50%;
            border: 3px solid white;
        }

        h1 {
            font-size: 40px;
            margin: 20px 0;
        }

        p {
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #333;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

<div class="container">
    <img src="me.jpg">

    <h1>你好 我是苔 </h1>
    <p>诗也老 赋也狂 我今剑杀玉楼郎</p>

    <a class="btn" href="#">联系我</a>
</div>

</body>
</html>

</body>
</html>
